<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Interface</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
            height: 100%;
        }

        .chat-window {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 999;
        }

        .chat-header {
            background-color: #1f771d;
            color: #ffffff;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
        }

        .chat-header h3 {
            margin: 0;
            color: #ffffff;
            font-size: 1.1rem;
        }

        .close-chat-btn {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 24px;
            cursor: pointer;
            line-height: 1;
            padding: 0;
        }

        .chat-messages {
            flex-grow: 1;
            padding: 15px;
            overflow-y: auto;
            background-color: #f3f3f3;
        }

        .message {
            display: flex;
            margin-bottom: 12px;
            max-width: 85%;
        }

        .message-content {
            padding: 10px 15px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.user {
            margin-left: auto;
            flex-direction: row-reverse;
        }

        .message.user .message-content {
            background-color: #25D366;
            color: #ffffff;
            border-bottom-right-radius: 4px;
        }

        .message.ai .message-content {
            background-color: #e9e9eb;
            color: #333333;
            border-bottom-left-radius: 4px;
        }

        .chat-input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #dddddd;
            background-color: #ffffff;
        }

        #chat-input {
            flex-grow: 1;
            border: 1px solid #cccccc;
            border-radius: 20px;
            padding: 10px 15px;
            font-size: 1rem;
            outline: none;
        }

        #chat-input:focus {
            border-color: #1f771d;
        }

        #send-btn {
            background-color: #1f771d;
            color: #ffffff;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            margin-left: 10px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <div id="chatbot-container">
        <div class="chat-window">
            
            <div class="chat-header">
                <h3>Asistente Virtual</h3>
                <button class="close-chat-btn">&times;</button>
            </div>
            
            <div class="chat-messages" id="chat-messages">
                <!-- Mensajes vacíos para desarrollo -->
            </div>
            
            <form class="chat-input-area" id="chat-form">
                <input type="text" id="chat-input" placeholder="Escribe un mensaje..." autocomplete="off">
                <button type="submit" id="send-btn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </form>

        </div>
    </div>

    <script>
        const messagesContainer = document.getElementById('chat-messages');
        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const closeBtn = document.querySelector('.close-chat-btn');

        // Función básica para meter burbujas al DOM
        function appendMessage(role, text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role === 'user' ? 'user' : 'ai'}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;

            messageDiv.appendChild(contentDiv);
            messagesContainer.appendChild(messageDiv);
            
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Mensaje inicial de prueba
        appendMessage('ai', '¡Hola! Escribe un mensaje para empezar.');

        // Captura de envío limpia
        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = chatInput.value.trim();
            
            if (text) {
                chatInput.value = ''; // Limpieza instantánea
                appendMessage('user', text);
            }
        });

        // Manejador del botón de cierre muerto
        closeBtn.addEventListener('click', () => {
            console.log("Cerrar ventana presionado.");
        });
    </script>
</body>
</html>
